baseURL = 'https://jungwoo0716.github.io/'
languageCode = 'ko'
defaultContentLanguage = 'ko'
title = 'JUNGWOO KIM'
theme = 'PaperMod'
paginate = 10

[params]
  env = "production"
  author = "김정우"
  description = "AI, Business, Technology - 김정우의 기술 블로그"
  keywords = ["AI", "Business", "SaaS", "스타트업", "기술블로그", "김정우"]
  DateFormat = "2006-01-02"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  images = ["images/og-default.png"]

  [params.homeInfoParams]
    Title = "JUNGWOO KIM"
    Content = "AI & Business — CEO of SPACEBAR Corp. AI SaaS, 커머스, 그리고 기술에 대한 생각들"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/jungwoo0716"

  [[params.socialIcons]]
    name = "email"
    url = "mailto:kimjungwoo0716@gmail.com"

  [params.assets]
    favicon = "favicon.ico"
    favicon16x16 = "favicon-16x16.png"
    favicon32x32 = "favicon-32x32.png"
    apple_touch_icon = "apple-touch-icon.png"
    theme_color = "#1a1a2e"
    msapplication_TileColor = "#1a1a2e"

[params.cover]
  hidden = false
  hiddenInList = false
  hiddenInSingle = false

[params.fuseOpts]
  isCaseSensitive = false
  shouldSort = true
  location = 0
  distance = 1000
  threshold = 0.4
  minMatchCharLength = 0
  keys = ["title", "permalink", "summary", "content"]

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[menu]
  [[menu.main]]
    identifier = "paperclip"
    name = "Paperclip"
    url = "/docs/paperclip/"
    weight = 1
  [[menu.main]]
    identifier = "openclaw"
    name = "OpenClaw"
    url = "/docs/openclaw/"
    weight = 2
  [[menu.main]]
    identifier = "search"
    name = "검색"
    url = "/search/"
    weight = 3
  [[menu.main]]
    identifier = "tags"
    name = "태그"
    url = "/tags/"
    weight = 4
  [[menu.main]]
    identifier = "series"
    name = "시리즈"
    url = "/series/"
    weight = 5
  [[menu.main]]
    identifier = "archives"
    name = "아카이브"
    url = "/archives/"
    weight = 6
  [[menu.main]]
    identifier = "about"
    name = "소개"
    url = "/about/"
    weight = 7

[taxonomies]
  tag = "tags"
  series = "series"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    style = "monokai"
    lineNos = false
    codeFences = true
  [markup.goldmark.renderer]
    unsafe = true
