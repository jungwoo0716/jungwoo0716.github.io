{{- define "main" }}

<div class="docs-layout">
  <aside class="docs-sidebar">
    <div class="docs-sidebar-inner">
      <div class="docs-sidebar-title">
        <a href="{{ .Parent.Permalink }}">{{ .Parent.Title }}</a>
      </div>
      <nav class="docs-nav">
        {{ $currentPage := . }}
        {{ range .Parent.Pages.ByWeight }}
        <a href="{{ .Permalink }}"{{ if eq .Permalink $currentPage.Permalink }} class="active"{{ end }}>{{ .Title }}</a>
        {{ end }}
      </nav>
    </div>
  </aside>

  <div class="docs-content">
    <h1 class="docs-title">{{ .Title }}</h1>
    <div class="post-content">
      {{ .Content }}
    </div>
    <div class="docs-pager">
      {{ with .PrevInSection }}
      <a href="{{ .Permalink }}" class="docs-pager-prev">
        <span class="docs-pager-label">&larr; 이전</span>
        <span class="docs-pager-title">{{ .Title }}</span>
      </a>
      {{ end }}
      {{ with .NextInSection }}
      <a href="{{ .Permalink }}" class="docs-pager-next">
        <span class="docs-pager-label">다음 &rarr;</span>
        <span class="docs-pager-title">{{ .Title }}</span>
      </a>
      {{ end }}
    </div>
  </div>

  <aside class="docs-toc">
    <div class="docs-toc-inner">
      <div class="docs-toc-title">목차</div>
      {{ .TableOfContents }}
    </div>
  </aside>
</div>

{{- end }}
