{{- define "main" }}

<div class="docs-index-page">
  <h1 class="docs-index-title">{{ .Title }}</h1>
  <div class="post-content">{{ .Content }}</div>
  <div class="docs-index-grid">
    {{ range .Pages.ByWeight }}
    <a href="{{ .Permalink }}" class="docs-index-card">
      <span class="docs-index-card-num">{{ .Weight }}</span>
      <h3>{{ .Title }}</h3>
    </a>
    {{ end }}
  </div>
</div>

{{- end }}
